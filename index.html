<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    

    <link rel="stylesheet" href="styles/main.css">

   
</head>
<body>
    
    <header>
        <h2>Current Time</h2>
    </header>

    
    <main>
        <div class = "container">
            <div class="digitalclock">
                <h3 id="day">Mon</h3>
                <h3 id="hours">1</h3>
                <h3 id="c1">:</h3>
                <h3 id="min">20</h3>
                <h3 id="c2">:</h3>
                <h3 id="sec">30</h3>
                <h3 id="ampm"></h3>
            </div>

        </div>

    </main>

    
    <footer>
            <p>&copy; <span id="year"></span> Charles Productions</p>
    </footer>
</body>
</html>
 <script src="js/digitalclock.js"></script>
